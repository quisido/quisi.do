# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Authenticate Codex
description: authenticates Codex

inputs:
  auth-json:
    description: base64-encoded Codex auth.json
    required: true
  home:
    default: ~/.codex
    description: Codex home directory
    required: false

runs:
  using: composite
  steps:
    - name: Authenticate
      shell: bash
      env:
        CODEX_AUTH_JSON: ${{ inputs.auth-json }}
        CODEX_HOME: ${{ inputs.home }}
      run: >-
        mkdir --parents "$CODEX_HOME";
        printf '%s' "$CODEX_AUTH_JSON" |
        base64 --decode > "$CODEX_HOME/auth.json";
        chmod 600 "$CODEX_HOME/auth.json";
