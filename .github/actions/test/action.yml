# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Test
description: Tests the repository

runs:
  using: composite
  steps:
    - name: Setup
      uses: ./.github/actions/setup
    - name: Install browser dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        npx playwright install-deps \
          chromium-headless-shell firefox webkit;
    - name: Install browsers
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        npx playwright install --only-shell \
          chromium-headless-shell firefox webkit;
    - name: Test
      run: npm test
      shell: bash
      env:
        VITE_TESTED_DESIGN_SYSTEM: template
    - name: Upload
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test
        if-no-files-found: error
        include-hidden-files: true
        path: |
          .tests/
          packages/*/.tests/
