# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Build
description: Builds the repository

inputs:
  continue-on-error:
    default: 'false'
    description: Continue the workflow even if the build fails?
    required: false
  environment:
    default: development
    description: The environment being built (e.g. production, staging)
    required: true
  install-browsers:
    default: 'false'
    description: Whether to install browsers
    required: false
  upload:
    default: 'true'
    description: Upload the build artifacts?
    required: false

runs:
  using: composite
  steps:
    - name: Setup
      continue-on-error: ${{ inputs.continue-on-error != 'false' }}
      uses: ./.github/actions/setup
      with:
        continue-on-error: ${{ inputs.continue-on-error != 'false' }}
        download-build: false
        install-browsers: ${{ inputs.install-browsers }}

    - name: Build
      continue-on-error: ${{ inputs.continue-on-error != 'false' }}
      id: build
      run: npm run build
      shell: bash
      env:
        DD_PROFILING_ENABLED: true
        DD_VERSION: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
        NODE_ENV: ${{ inputs.environment }}

    - name: Save TypeScript cache
      if: >-
        ${{
          github.ref_name == github.event.repository.default_branch &&
          steps.build.outcome == 'success'
        }}
      uses: actions/cache/save@v4
      with:
        path: |
          .cache/*.tsbuildinfo
          packages/*/.cache/*.tsbuildinfo
        key: >-
          typescript-
          ${{ runner.os }}-
          ${{ hashFiles('package-lock.json') }}-
          ${{ github.event.repository.default_branch }}-
          ${{ github.sha }}

    - name: Upload
      if: ${{ inputs.upload == 'true' && steps.build.outcome == 'success' }}
      uses: actions/upload-artifact@v6
      with:
        name: build
        if-no-files-found: error
        path: |
          dist/
          packages/*/_site/
          packages/*/dist/
