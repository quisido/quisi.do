# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Codecov
description: Uploads test artifacts to Codecov

runs:
  using: composite
  steps:
    - name: Download
      uses: actions/download-artifact@v7
      with:
        name: test
        path: packages
    - name: Upload
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
