# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Setup
description: Sets up Node and installs dependencies

inputs:
  download-build:
    default: 'true'
    description: Whether to download the build artifact
    required: false

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        check-latest: true
        node-version-file: .nvmrc
    - name: Download build
      if: ${{ inputs.download-build == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: build
    - name: Install dependencies
      shell: bash
      # Build `quisido` then re-install to symlink the dependency.
      run: |
        pnpm install;
        pnpm run build --filter=./packages/quisido;
        pnpm install;
