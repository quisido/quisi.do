# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Cloudflare purge
description: Purges files from Cloudflare cache

inputs:
  api-token:
    description: Cloudflare API Token with cache purge permissions
    required: true
  quisi-do-zone-id:
    description: Cloudflare Zone ID for quisi.do
    required: true
  quisido-dev-zone-id:
    description: Cloudflare Zone ID for quisido.dev
    required: true

runs:
  using: composite
  steps:
    - name: Purge quisi.do cache
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ZONE_ID: ${{ inputs.quisi-do-zone-id }}
      run: >
        curl \
          --data '{
            "files": [
              "https://quisi.do",
              "https://quisi.do/index.html"
            ]
          }' \
          --fail \
          --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          --header "Content-Type:application/json" \
          --request POST \
          "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache"
    - name: Purge quisido.dev cache
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ZONE_ID: ${{ inputs.quisido-dev-zone-id }}
      run: >
        curl \
          --data '{
            "files": [
              "https://quisido.dev",
              "https://quisido.dev/index.html"
            ]
          }' \
          --fail \
          --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          --header "Content-Type:application/json" \
          --request POST \
          "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache"
