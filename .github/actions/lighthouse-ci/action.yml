# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Lighthouse
description: Runs Lighthouse audits

runs:
  using: composite
  steps:
    - name: Setup
      uses: ./.github/actions/setup
    - name: Audit
      shell: bash
      working-directory: packages/saas
      run: >-
        chmod +x ./scripts/lighthouse-serve.sh;
        ./scripts/lighthouse-serve.sh;
        npx esbuild --bundle --format=cjs --platform=node
        --outfile=./.tests/postlighthouse.cjs
        ./scripts/postlighthouse/index.ts &&
        node ./.tests/postlighthouse.cjs;
    - name: Upload
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: lighthouse-ci
        if-no-files-found: error
        path: |
          packages/saas/lighthouse.report.*
          packages/saas/lighthouse-*.devtoolslog.json
          packages/saas/lighthouse-*.trace.json
