# yaml-language-server: $schema=../../../schemas/github-action.jsonc
name: Sentry release
description: Uploads a Sentry release with sourcemaps

inputs:
  auth-token:
    description: Sentry auth token
    required: true

runs:
  using: composite
  steps:
    - name: Download
      uses: actions/download-artifact@v7
      with:
        name: build
    - name: Sentry release
      uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
      env:
        SENTRY_AUTH_TOKEN: ${{ inputs.auth-token }}
        SENTRY_LOG_LEVEL: info
        SENTRY_ORG: quisido
        SENTRY_PROJECT: quisi-do
      with:
        environment: production
        release: ${{ github.sha }}
        sourcemaps: packages/saas/_site
