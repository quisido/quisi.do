# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Pull request

concurrency:
  cancel-in-progress: true
  group: pull-request-${{ github.event.pull_request.number }}

on:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1: auto-merge, build, dependency-review
  auto-merge:
    name: Auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable
        run: gh pr merge --auto --squash "$PR_HTML_URL"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          PR_HTML_URL: ${{github.event.pull_request.html_url}}

  build:
    name: Build
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    runs-on: ubuntu-latest
    services:
      datadog-agent: &datadog-agent
        image: datadog/agent:latest
        env:
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_ENV: ci
          DD_HOSTNAME: none
          DD_INSIDE_CI: true
        ports:
          - 8126:8126
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Build
        uses: ./.github/actions/build
        with:
          environment: staging

  dependency-review:
    name: Dependency review
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Review
        uses: actions/dependency-review-action@v5

  # Stage 2: lighthouse, test, webhint
  lighthouse:
    name: Lighthouse
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    needs: build
    runs-on: ubuntu-latest
    services:
      datadog-agent: *datadog-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Lighthouse
        uses: ./.github/actions/lighthouse-ci

  test:
    name: Test
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    needs: build
    runs-on: ubuntu-latest
    services:
      datadog-agent: *datadog-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Test
        uses: ./.github/actions/test

  webhint:
    name: Webhint
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    needs: build
    runs-on: ubuntu-latest
    services:
      datadog-agent: *datadog-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Audit
        uses: ./.github/actions/webhint-ci

  # Stage 3: codecov
  codecov:
    name: Codecov
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: continuous-integration
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Upload
        uses: ./.github/actions/codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
