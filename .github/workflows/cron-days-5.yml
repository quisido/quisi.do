# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Every 5 days

concurrency:
  cancel-in-progress: true
  group: cron-days-5

on:
  schedule:
    # every 5 days
    - cron: '21 21 1/5 * *'
  workflow_dispatch:

permissions: {}

jobs:
  codex-auth:
    name: Authenticate Codex
    environment: codex
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read # git checkout
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: Install
        run: npm install --global @openai/codex

      - name: Refresh
        uses: ./.github/actions/codex
        with:
          auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          codex-token: ${{ github.token }}
          prompt: "Reply with exactly: ok"
          secrets-client-id: ${{ vars.WRITE_SECRETS_CLIENT_ID }}
          secrets-environment: codex
          secrets-private-key: ${{ secrets.WRITE_SECRETS_PRIVATE_KEY }}
