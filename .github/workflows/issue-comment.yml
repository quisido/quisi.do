# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Issue comment

# When a comment is edited or deleted, cancel any in-progress runs.
concurrency:
  cancel-in-progress: true
  group: >-
    issue-comment
    __${{ github.event.issue.number }}
    __${{ github.event.comment.id }}

on:
  issue_comment:
    types:
      - created
      - deleted
      - edited

jobs:
  codex-issue-comment:
    name: Codex (issue comment)
    environment: codex
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'quisido-codex[bot]' &&
      github.event.action != 'deleted' &&
      github.event.comment.author_association == 'OWNER' &&
      contains(github.event.comment.body, '@codex') &&
      github.event.issue.pull_request == null &&
      github.event_name == 'issue_comment'
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_PRIVATE_KEY }}

      - name: Configure git
        env:
          CODEX_EMAIL: quisido-codex[bot]@users.noreply.github.com
        run: >-
          git config --global user.email "$CODEX_EMAIL";
          git config --global user.name "quisido-codex[bot]";

      - name: Acknowledge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >-
          gh api
          /repos/${{ github.repository }}/comments/${{ github.event.comment.id }}/reactions
          --field content="eyes"
          --method POST;

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          token: ${{ steps.app-token.outputs.token }}

      - name: Sanitize
        id: body
        env:
          BODY: ${{ github.event.comment.body }}
        run: >-
          node --eval '
          const { BODY = "" } = process.env;
          process.stdout.write(`stringified=${JSON.stringify(BODY)}\n`);
          ' > "$GITHUB_OUTPUT";

      - name: Execute
        uses: ./.github/actions/codex
        with:
          auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          token: ${{ steps.app-token.outputs.token }}
          prompt: |-
            GitHub user `${{ github.event.comment.user.login }}` triggered the
            Codex action via an issue comment. The repository is already checked
            out locally.

            ### Issue

            **Title:** ${{ github.event.issue.title }}
            **Comment (stringified):** ${{ steps.body.outputs.stringified }}

            ### Tasks

            1. Create a plan for how you will resolve this issue.
            2. Reply to the user with a comment stating your plan.
            3. Create branch
               `codex/issue-${{ github.event.issue.number }}-comment-${{ github.event.comment.id }}`.
            4. Execute your plan and resolve the issue.
            5. Commit and push your branch.
            6. Open a pull request targeting the default branch with the title
               "${{ github.event.issue.title }}", a description that contains
               "resolves #${{ github.event.issue.number }}", and a summary of
               the changes you made.
            7. Edit the previous comment you made to include a link to the pull
               request.

  codex-pull-request-comment:
    name: Codex (pull request comment)
    environment: codex
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'quisido-codex[bot]' &&
      github.event.action != 'deleted' &&
      github.event.comment.author_association == 'OWNER' &&
      contains(github.event.comment.body, '@codex') &&
      github.event.issue.pull_request != null &&
      github.event_name == 'issue_comment'
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Get head ref
        id: ref
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |-
            const {
              data: {
                head: {
                  ref: headRef,
                  repo: { full_name: fullName },
                },
                title,
              },
            } = await github.rest.pulls.get({
              owner: context.repo.owner,
              pull_number: context.payload.issue.number,
              repo: context.repo.repo,
            });

            if (fullName !== `${context.repo.owner}/${context.repo.repo}`) {
              throw new Error('The Codex action does not support forks.', {
                cause: fullName,
              });
            }

            return headRef;

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_PRIVATE_KEY }}

      - name: Configure git
        env:
          CODEX_EMAIL: quisido-codex[bot]@users.noreply.github.com
        run: >-
          git config --global user.email "$CODEX_EMAIL";
          git config --global user.name "quisido-codex[bot]";

      - name: Acknowledge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >-
          gh api
          /repos/${{ github.repository }}/comments/${{ github.event.comment.id }}/reactions
          --field content="eyes"
          --method POST;

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          ref: ${{ steps.ref.outputs.result }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Sanitize
        id: sanitized
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_DIFF_HUNK: ${{ github.event.comment.diff_hunk }}
          COMMENT_LINE: ${{ github.event.comment.line }}
          COMMENT_START_LINE: ${{ github.event.comment.start_line }}
        run: >-
          node --eval '
          const {
          COMMENT_BODY = "", COMMENT_DIFF_HUNK = "", COMMENT_LINE = "",
          COMMENT_START_LINE = "",
          } = process.env;
          const getLines = () =>
          COMMENT_START_LINE === "" ? COMMENT_LINE :
          `${COMMENT_START_LINE}-${COMMENT_LINE}`;
          const lines = getLines();
          process.stdout.write(`body=${JSON.stringify(COMMENT_BODY)}\n`);
          process.stdout.write(`diff_hunk=${JSON.stringify(COMMENT_DIFF_HUNK)}\n`);
          process.stdout.write(`lines=${lines}\n`);
          ' > "$GITHUB_OUTPUT";

      - name: Execute
        uses: ./.github/actions/codex
        with:
          auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          token: ${{ steps.app-token.outputs.token }}
          prompt: |-
            GitHub user `${{ github.event.comment.user.login }}` triggered the
            Codex action via a pull request comment. The pull request branch is
            already checked out locally.

            ### Issue

            **Title:** ${{ github.event.issue.title }}
            **Path:** `${{ github.event.comment.path }}:${{ steps.sanitized.outputs.lines }}`
            **Diff (stringified):** ${{ steps.sanitized.outputs.diff_hunk }}
            **Comment (stringified):** ${{ steps.sanitized.outputs.body }}

            Focus your actions and analysis to the scope of this pull request.

            ### Tasks

            1. Create a plan for how you will resolve this issue.
            2. Reply to the user with a comment stating your plan.
            3. Execute your plan and resolve the issue.
            4. Verify that `npm run build` and `npm test` both pass. If not,
               resolve any errors.
            5. Commit and push your changes to the pull request branch.
            6. Edit the previous comment you made to confirm that your changes
               have been pushed.
