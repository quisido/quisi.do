# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Codex (issue)

# When an issue is edited or deleted, cancel any in-progress runs.
concurrency:
  cancel-in-progress: true
  group: codex__issue__${{ github.event.issue.number }}

on:
  issues:
    types:
      - deleted
      - edited
      - opened

jobs:
  codex:
    name: Codex
    environment: development
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.body, '@codex') &&
      github.event.action != 'deleted' &&
      github.event.issue.author_association == 'OWNER'
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sanitize
        id: body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node --eval \
            'const { ISSUE_BODY = "" } = process.env; process.stdout.write(`stringified=${JSON.stringify(ISSUE_BODY)}\n`);' \
            > "$GITHUB_OUTPUT";
      - name: Execute
        uses: ./.github/actions/codex
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            GitHub user `${{ github.event.issue.user.login }}` triggered the
            Codex action via an issue. The repository is already checked out
            locally.

            ### Issue

            **Title:** ${{ github.event.issue.title }}
            **Body (stringified):** ${{ steps.body.outputs.stringified }}

            ### Tasks

            1. Create branch `codex/issue-${{ github.event.issue.number }}`.
            2. Resolve the user's request.
            3. Push your branch to the remote repository.
            4. Open a pull request targeting the default branch with the title
               "${{ github.event.issue.title }}" and a description that contains
               "resolves #${{ github.event.issue.number }}" and a summary of the
               changes you made.
            5. Reply to the issue with a concise summary of the changes you
               made, any verification steps you took, and a link to the pull
               request.
