# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Codex (pull request comment)

# When a comment is edited or deleted, cancel any in-progress runs.
concurrency:
  cancel-in-progress: true
  group: >-
    codex__pull-request-comment__
    ${{ github.event.issue.number }}__
    ${{ github.event.comment.id }}

on:
  issue_comment:
    types:
      - created
      - deleted
      - edited

jobs:
  codex:
    name: Codex
    environment: development
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '@codex') &&
      github.event.action != 'deleted' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.issue.pull_request != null
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Get head ref
        id: ref
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const {
              data: {
                head: {
                  ref: headRef,
                  repo: { full_name: fullName },
                },
                title,
              },
            } = await github.rest.pulls.get({
              owner: context.repo.owner,
              pull_number: context.payload.issue.number,
              repo: context.repo.repo,
            });

            if (fullName !== `${context.repo.owner}/${context.repo.repo}`) {
              throw new Error('The Codex action does not support forks.', {
                cause: fullName,
              });
            }

            return headRef;

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          ref: ${{ steps.ref.outputs.result }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize
        id: comment
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node --eval \
            'const { COMMENT_BODY = "" } = process.env; process.stdout.write(`stringified=${JSON.stringify(COMMENT_BODY)}\n`);' \
            > "$GITHUB_OUTPUT";

      - name: Execute
        uses: ./.github/actions/codex
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            GitHub user `${{ github.event.comment.user.login }}` triggered the
            Codex action via a pull request comment. The pull request branch is
            already checked out locally.

            ### Issue

            **Title:** ${{ github.event.issue.title }}
            **Comment (stringified):** ${{ steps.comment.outputs.stringified }}

            Focus your actions and analysis to the scope of this pull request.

            ### Tasks

            1. Create a plan for how you will resolve this issue.
            2. Reply to the user with a comment stating your plan.
            3. Execute your plan and resolve the issue.
            4. Commit and push your changes to the pull request branch.
            5. Edit the previous comment you made to include a link to the pull
               request.
