# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Codex login

concurrency:
  cancel-in-progress: true
  group: codex-login

on:
  schedule:
    # every 5 days
    - cron: '21 21 1/5 * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  login:
    name: Login
    environment: codex
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: Install
        run: npm install --global @openai/codex

      - name: Restore
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: >-
          mkdir --parents "$CODEX_HOME";
          printf '%s' "$CODEX_AUTH_JSON" |
          base64 --decode > "$CODEX_HOME/auth.json";
          chmod 600 "$CODEX_HOME/auth.json";

      - name: Login
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: >-
          codex debug models |
          jq --raw-output '.models[0].base_instructions';

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.WRITE_SECRETS_APP_ID }}
          private-key: ${{ secrets.WRITE_SECRETS_PRIVATE_KEY }}

      - name: Store
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >-
          base64 --wrap 0 "$CODEX_HOME/auth.json" |
          gh secret set CODEX_AUTH_JSON --app actions --env codex;
