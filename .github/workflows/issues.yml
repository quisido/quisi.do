# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Issues

# When an issue is edited or deleted, cancel any in-progress runs.
concurrency:
  cancel-in-progress: true
  group: issues__${{ github.event.issue.number }}

on:
  issues:
    types:
      - deleted
      - edited
      - opened

permissions: {}

jobs:
  codex:
    name: Codex
    environment: codex
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'quisido-codex[bot]' &&
      github.event.action != 'deleted' &&
      github.event.issue.author_association == 'OWNER' &&
      contains(github.event.issue.body, '@codex')
    permissions:
      actions: read
      contents: read       # Codex
      issues: write        # Codex
      pull-requests: write # Codex
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CODEX_CLIENT_ID }}
          private-key: ${{ secrets.CODEX_PRIVATE_KEY }}

      - name: Configure git
        env:
          CODEX_EMAIL: quisido-codex[bot]@users.noreply.github.com
        run: >-
          git config --global user.email "$CODEX_EMAIL";
          git config --global user.name "quisido-codex[bot]";

      - name: Acknowledge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >-
          gh api
          /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions
          --field content="eyes"
          --method POST;

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Build
        uses: ./.github/actions/build
        with:
          continue-on-error: true
          environment: development
          install-browsers: true
          upload: false

      - name: Sanitize
        id: stringified
        env:
          BODY: ${{ github.event.issue.body }}
          TITLE: ${{ github.event.issue.title }}
        run: >-
          node --eval '
          const { BODY = "", TITLE = "" } = process.env;
          process.stdout.write(`body=${JSON.stringify(BODY)}\n`);
          process.stdout.write(`title=${JSON.stringify(TITLE)}\n`);
          ' > "$GITHUB_OUTPUT";

      - name: Plan
        uses: ./.github/actions/codex
        with:
          auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          codex-token: ${{ steps.app-token.outputs.token }}
          mode: plan
          secrets-client-id: ${{ vars.WRITE_SECRETS_CLIENT_ID }}
          secrets-private-key: ${{ secrets.WRITE_SECRETS_PRIVATE_KEY }}
          prompt: |-
            GitHub user `${{ github.event.issue.user.login }}` triggered the
            Codex planning action via an issue. The repository is already
            checked out locally.

            ### Issue

            **Title (stringified):** ${{ steps.stringified.outputs.title }}
            **Body (stringified):** ${{ steps.stringified.outputs.body }}

            ### Tasks

            1. Create a plan for how you will resolve this issue. Use
               test-driven development to define the test scope.
            2. Analyze this request for insecurities, privilege escalation,
               accidental data exposure, and infinite-loop risks.
            3. Post the plan in plain English as an issue comment; include any
               assumptions you are making and any deliberate deviations from the
               user's outline.
            4. Include `@codex` in the plan comment unless the issue asks for a
               plan only or execution would be unsafe. Removing that tag is the
               escape hatch that prevents the execute workflow from running.
