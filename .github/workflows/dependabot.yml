name: Dependabot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable
        run: gh pr merge --auto --merge "$PR_HTML_URL"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          PR_HTML_URL: ${{github.event.pull_request.html_url}}
