# yaml-language-server: $schema=../../schemas/github-workflow.jsonc
name: Dependabot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  merge:
    name: Auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable
        run: gh pr merge --auto --squash "$PR_HTML_URL"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          PR_HTML_URL: ${{github.event.pull_request.html_url}}
