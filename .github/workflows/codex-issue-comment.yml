name: Codex (issue comment)

# When a comment is edited or deleted, cancel any in-progress runs.
concurrency:
  cancel-in-progress: true
  group: >-
    codex__issue-comment__
    ${{ github.event.issue.number }}__
    ${{ github.event.comment.id }}

on:
  issue_comment:
    types:
      - created
      - deleted
      - edited

jobs:
  codex:
    name: Codex
    environment: development
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '@codex') &&
      github.event.action != 'deleted' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.issue.pull_request == null
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 9
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sanitize
        id: comment
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node --eval \
            'const { COMMENT_BODY = "" } = process.env; process.stdout.write(`stringified=${JSON.stringify(COMMENT_BODY)}\n`);' \
            > "$GITHUB_OUTPUT";
      - name: Execute
        uses: ./.github/actions/codex
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            GitHub user `${{ github.event.comment.user.login }}` triggered the
            Codex action via an issue comment. The repository is already checked
            out locally.

            ### Issue

            **Title:** ${{ github.event.issue.title }}
            **Comment (stringified):** ${{ steps.comment.outputs.stringified }}

            ### Tasks

            1. Create branch
               `codex/issue-${{ github.event.issue.number }}-comment-${{ github.event.comment.id }}`.
            2. Resolve the user's request.
            3. Push your branch to the remote repository.
            4. Open a pull request targeting the default branch with the title
               "${{ github.event.issue.title }}" and a description that contains
               "resolves #${{ github.event.issue.number }}" and a summary of the
               changes you made.
            5. Reply to the issue comment with a concise summary of the changes
               you made, any verification steps you took, and a link to the pull
               request.
