#:schema https://developers.openai.com/codex/config-schema.json

# Codex config for the `quisi.do` repository
hide_agent_reasoning = true
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "low"
personality = "pragmatic"
plan_mode_reasoning_effort = "high"
sandbox_mode = "workspace-write"
web_search = "live"

[approval_policy.granular]
mcp_elicitations = true
request_permissions = false # TODO: Is this safe to enable?
rules = false # TODO: Is this safe to enable?
sandbox_approval = false # TODO: Is this safe to enable?
skill_approval = true

[features]
js_repl = true
multi_agent = true
prevent_idle_sleep = true

[feedback]
enabled = false

[mcp_servers.mdn]
url = "https://mcp.mdn.mozilla.net/"

[mcp_servers.playwright]
args = ["@playwright/mcp"]
command = "npx"

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."sentry@openai-curated"]
enabled = true

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "core"
